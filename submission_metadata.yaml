ai_usage_summary: |
  Used Claude for architecture design, code implementation, and test design
  across the scoring pipeline (TF-IDF similarity, feature extraction,
  honeypot/disqualifier detection, reasoning generation). All logic was
  reviewed, run against the full released candidate pool, and validated
  with the provided validate_submission.py. No candidate data was sent to
  any external API — the ranking step itself makes no network calls.

methodology_summary: |
  Rule-based + TF-IDF hybrid ranker, deliberately avoiding the skills array
  as a scoring input to defeat keyword-stuffing. Base fit score combines
  TF-IDF text similarity (JD vs. candidate summary/career descriptions),
  title relevance (regex against actual job titles held, not skills),
  production-ML and eval-rigor evidence (keyword hits inside career
  descriptions only), experience-band fit, and location fit. This is
  multiplied by a behavioral modifier (response rate, activity recency,
  interview completion, notice period) and gated by a severity-weighted
  honeypot detector (impossible skill-duration combos, career-month/YOE
  mismatches, malformed date ranges) and a disqualifier detector matching
  the JD's explicit "do not want" list (pure research, consulting-only,
  CV/speech-only without NLP/IR, title-chasing, senior-non-coding).
  Verified 0% honeypot rate and 0 keyword-stuffer titles in the produced
  top-100 over the full released 100K-candidate pool. Runtime ~60-100s,
  CPU only, no network calls during ranking.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
